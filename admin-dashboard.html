<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f0f4f7;
}

/* Navigation bar */

.navbar{
background:#0a7f8f;
padding:15px;
color:white;
display:flex;
gap:25px;
font-size:18px;
}

.navbar span{
cursor:pointer;
}

.navbar span:hover{
text-decoration:underline;
}

/* Filter */

.filter-box{
padding:15px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Map */

#map{
height:500px;
margin:20px;
border-radius:15px;
}

/* Engineer image */

.engineer{
position:absolute;
bottom:15px;
right:15px;
width:90px;
opacity:0.6;
}

/* Back arrow */

.back{
padding:10px;
font-size:18px;
cursor:pointer;
color:#0a7f8f;
}

</style>
</head>

<body>

<div class="back"
onclick="history.back()">← Back</div>

<div class="navbar">

<span onclick="location.href='admin-dashboard.html'">
Map
</span>

<span onclick="location.href='all-reports.html'">
Reports
</span>

<span onclick="location.href='manage-status.html'">
Manage Status & Priority
</span>

</div>


<div class="filter-box">

Filter:

<select id="filterSelect"
onchange="filterPins()">

<option value="all">
All Reports
</option>

<option value="Reported">
Reported
</option>

<option value="Validated">
Validated
</option>

<option value="Assigned">
Assigned
</option>

<option value="In Progress">
In Progress
</option>

<option value="Resolved">
Resolved
</option>

<option value="High">
High Priority
</option>

<option value="Medium">
Medium Priority
</option>

<option value="Low">
Low Priority
</option>

</select>

</div>


<div id="map"></div>

<img src="engineer.png"
class="engineer">


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map')
.setView([36.19,5.41],15);


/* Campus background */

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);


/* Load reports */

var reports =
JSON.parse(localStorage.getItem("reports") || "[]");


var markers = [];


/* Create pins */

reports.forEach(function(r){

var marker =
L.marker([36.19 + Math.random()/100,
5.41 + Math.random()/100])
.addTo(map);

marker.bindPopup(

"<b>" + r.title + "</b><br>" +

"Status: " + r.status + "<br>" +

"Priority: " + r.priority

);

marker.reportData = r;

markers.push(marker);

});


/* Filter system */

function filterPins(){

var selected =
document.getElementById("filterSelect").value;

markers.forEach(function(marker){

var r = marker.reportData;

if(selected === "all"){

marker.addTo(map);

}

else if(r.status === selected){

marker.addTo(map);

}

else if(r.priority === selected){

marker.addTo(map);

}

else{

map.removeLayer(marker);

}

});

}

</script>

</body>
</html>

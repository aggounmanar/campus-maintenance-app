<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics | Smart Maintenance</title>
    <link rel="stylesheet" href="admin-dashboard-stats.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="orb" style="width: 300px; height: 300px; background: #3498db; top: -100px; left: -100px;"></div>
    <div class="orb" style="width: 200px; height: 200px; background: #2ecc71; bottom: -50px; right: -50px; animation-delay: 5s;"></div>
    <div class="orb" style="width: 250px; height: 250px; background: #9b59b6; top: 50%; left: 50%; animation-delay: 10s;"></div>

    <div class="back" onclick="history.back()">← Back</div>
    <div class="navbar">
        <span onclick="location.href='admin-dashboard.html'">🗺️ Map</span>
        <span onclick="location.href='admin-dashboard-stats.html'">📊 Statistics</span>
        <span onclick="location.href='all-reports.html'">📋 Reports</span>
        <span onclick="location.href='manage-status.html'">⚙️ Manage</span>
    </div>

    <div class="stats-container">
        <div class="stats-header">
            <h1>📊 Maintenance Analytics Dashboard</h1>
            <p>Real-time statistics & insights</p>
            <button class="refresh-btn" onclick="refreshDashboard()">🔄 Refresh Data</button>
        </div>
        <div class="cards-grid" id="summaryCards"></div>
        <div class="charts-grid">
            <div class="chart-container">
                <h3>📈 Reports by Status</h3>
                <canvas id="statusChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>⚠️ Reports by Priority</h3>
                <canvas id="priorityChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>🏢 Reports by Building</h3>
                <canvas id="buildingChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>🔧 Reports by Category</h3>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>
    </div>

    <script src="admin-dashboard-stats.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Submit New Report</title>
<style>
body{
    font-family:Segoe UI;
    background:#f0f4f7;
    margin:0;
    padding:20px;
}

.topbar{
    background:#0a7f8f;
    color:white;
    padding:10px;
    text-align:center;
    font-size:18px;
}

.back-btn{
    margin:10px 0;
    font-size:20px;
    cursor:pointer;
    color:#0a7f8f;
    display:inline-block;
}

.form-container{
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, textarea, select, button{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    background:#0a7f8f;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>
<div class="back-btn" onclick="goBack()">⬅ Back</div>
<div class="topbar">Submit New Report</div>


<div class="form-container">
    <select id="category">
        <option>Electricity</option>
        <option>Water</option>
        <option>Network</option>
        <option>Air Conditioning</option>
        <option>Other</option>
    </select>

    <input type="text" id="title" placeholder="Report title">
    <textarea id="description" placeholder="Describe the problem"></textarea>
    <input type="file" id="fileUpload">
    <button onclick="submitReport()">Submit Report</button>
</div>

<script>
let reports = JSON.parse(localStorage.getItem("reports") || "[]");

// جلب إحداثيات المكان الذي ضغط عليه الطالب
let selectedLat = parseFloat(localStorage.getItem("selectedLat"));
let selectedLng = parseFloat(localStorage.getItem("selectedLng"));

function goBack(){
    window.location.href = "user-dashboard.html";
}

function submitReport(){
    let category = document.getElementById("category").value;
    let title = document.getElementById("title").value;
    let description = document.getElementById("description").value;

    if(!category  ||!title||  !description || !selectedLat || !selectedLng){
        alert("Please complete all fields and select location on map");
        return;
    }

    reports.push({
        category: category,
        title: title,
        description: description,
        status: "Reported",
        priority: "Low",
        lat: selectedLat,   // الإحداثيات الدقيقة
        lng: selectedLng,
        user: "Student"     // اسم الطالب
    });

    localStorage.setItem("reports", JSON.stringify(reports));
    alert("Report submitted successfully ✔");
    goBack();
}
</script>

</body>
</html>

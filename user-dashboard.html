<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Smart Maintenance</title>
    <link rel="stylesheet" href="user-dashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        #map, .leaflet-container, .leaflet-interactive {
            cursor: pointer !important;
        }
    </style>
</head>
<body class="student-page">
    <div class="bg-animation"></div>
    <div class="orb" style="width: 300px; height: 300px; background: #3498db; top: -100px; left: -100px;"></div>
    <div class="orb" style="width: 200px; height: 200px; background: #2ecc71; bottom: -50px; right: -50px; animation-delay: 5s;"></div>

    <div class="back" onclick="history.back()">← Back</div>
    
    <div class="navbar">
        <span onclick="location.href='user-dashboard.html'">🗺️ Map</span>
    </div>

    <div class="welcome-card">
        <div class="welcome-text">
            <h3>👋 Welcome, Student!</h3>
            <p>Report maintenance issues and track their progress</p>
        </div>
        <button class="report-btn" onclick="createNewReport()">➕ Create New Report</button>
    </div>

    <div class="info-message">
        💡 <strong>How to use:</strong><br>
        • Click on any <strong>📌 pin</strong> to view details and add comments<br>
        • Click on <strong>empty area</strong> on the map to create a new report<br>
        • Your comments help technicians understand the issue better
    </div>

    <!-- EXTERNAL TOOLBAR - REPLACES MAP CONTROLS -->
    <div class="external-map-toolbar">
        <div class="toolbar-row">
            <button id="extZoomIn" class="toolbar-btn primary">
                <span>➕</span> Zoom In
            </button>
            <button id="extZoomOut" class="toolbar-btn primary">
                <span>➖</span> Zoom Out
            </button>
            <button id="extReset" class="toolbar-btn primary">
                <span>🗺️</span> Reset View
            </button>
            <button id="extSearchToggle" class="toolbar-btn success">
                <span>🔍</span> Search Building
            </button>
        </div>
        <div id="extSearchArea" class="search-area" style="display: none;">
            <input type="text" id="extSearchInput" placeholder="Type building name... (e.g., Amphi, Library, Lab)">
            <div id="extSearchResults" class="search-results-list"></div>
        </div>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="campus-map.js"></script>
    <script src="user-dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#f0f4f7;
}

/* Navigation bar */
.navbar{
    background:#0a7f8f;
    padding:15px;
    color:white;
    display:flex;
    gap:25px;
    font-size:18px;
}

.navbar span{
    cursor:pointer;
}

.navbar span:hover{
    text-decoration:underline;
}

/* Map */
#map{
    height:500px;
    margin:20px;
    border-radius:15px;
}

/* Engineer image */
.engineer{
    position:absolute;
    bottom:15px;
    right:15px;
    width:90px;
    opacity:0.6;
}

/* Back arrow */
.back{
    padding:10px;
    font-size:18px;
    cursor:pointer;
    color:#0a7f8f;
}
</style>
</head>

<body>

<div class="back" onclick="history.back()">← Back</div>

<div class="navbar">
    <span onclick="location.href='user-dashboard.html'">Map</span>
</div>

<div id="map"></div>

<img src="engineer.png" class="engineer">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([36.19,5.41],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* لا نرسم أي Pins في خريطة الطالب */

/* On click map -> save location and go to submit page */
map.on('click', function(e){
    localStorage.setItem("selectedLat", e.latlng.lat);
    localStorage.setItem("selectedLng", e.latlng.lng);
    window.location.href = "submit-report.html";
});
</script>

</body>
</html>

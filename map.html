<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Campus Map</title>
<style>
body, html {height:100%; margin:0; padding:0;}
#map {width:100%; height:100%;}
.engineer{
position:absolute; bottom:15px; right:15px; width:90px; opacity:0.6; z-index:1000;
}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div id="map"></div>
<img src="engineer.png" class="engineer">

<script>
// قراءة role و username
let role = sessionStorage.getItem("role");
let username = sessionStorage.getItem("username");

// تهيئة الخريطة
let map = L.map('map').setView([36.5, 6.2], 16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

// جلب التقارير المخزنة
let reports = JSON.parse(localStorage.getItem("reports") || "[]");

// إضافة markers مع popup احترافي
reports.forEach(rep => {
    let marker = L.marker([rep.lat, rep.lng]).addTo(map);

    let popupContent = "<div style='width:250px;font-family:Segoe UI;'>" +
        "<img src='engineer.png' style='width:50px; float:right; opacity:0.6; border-radius:5px;'>" +
        "<b>" + rep.title + "</b><br>" +
        "<i>By: " + rep.user + "</i><br>" +
        "<p style='margin:5px 0;'>" + rep.description + "</p>" +
        "<p>Status: <b>" + rep.status + "</b></p>" +
        "<p>Priority: <b>" + rep.priority + "</b></p>" +
        "</div>";

    if(role==="admin"){
        popupContent += "<div style='margin-top:5px;'>" +
            "<button style='margin:2px;padding:5px;cursor:pointer;' onclick='updateStatus(\"" + rep.id + "\")'>Update Status</button>" +
            "<button style='margin:2px;padding:5px;cursor:pointer;' onclick='updatePriority(\"" + rep.id + "\")'>Update Priority</button>" +
            "</div>";
    }

    marker.bindPopup(popupContent);
});

// Student يضيف pin → submit
if(role==="student"){
    map.on('click', function(e){
        sessionStorage.setItem("pinLat", e.latlng.lat);
        sessionStorage.setItem("pinLng", e.latlng.lng);
        window.location="submit.html";
    });
}

// Admin تعديل Status
function updateStatus(id){
    let newStatus = prompt("Enter new status (Reported, Validated, Assigned, In Progress, Resolved):");
    if(!newStatus) return;
    let reports = JSON.parse(localStorage.getItem("reports") || "[]");
    let rep = reports.find(r=>r.id===id);
    if(rep){ rep.status = newStatus; localStorage.setItem("reports", JSON.stringify(reports)); location.reload(); }
}

// Admin تعديل Priority
function updatePriority(id){
    let newPriority = prompt("Enter new priority (Low, Medium, High):");
    if(!newPriority) return;
    let reports = JSON.parse(localStorage.getItem("reports") || "[]");
    let rep = reports.find(r=>r.id===id);
    if(rep){ rep.priority = newPriority; localStorage.setItem("reports", JSON.stringify(reports)); location.reload(); }
}
</script>

</body>
</html>

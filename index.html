<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Maintenance | Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="bg-animation"></div>
    <div class="orb" style="width: 300px; height: 300px; background: #3498db; top: -100px; left: -100px;"></div>
    <div class="orb" style="width: 200px; height: 200px; background: #2ecc71; bottom: -50px; right: -50px; animation-delay: 5s;"></div>
    <div class="orb" style="width: 150px; height: 150px; background: #9b59b6; top: 60%; left: 80%; animation-delay: 10s;"></div>

    <div class="login-container">
        <div class="logo-section">
            <div class="school-logo">
                <!-- الصورة ستظهر داخل الدائرة الصغيرة أعلى الصفحة -->
                <img src="logo.png" alt="School Logo">
            </div>
            <h1>SMART MAINTENANCE</h1>
            <p>Intelligent Reporting System</p>
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="📧 Email address" autocomplete="off" name="email">
            <div class="error-msg" id="emailError">Please enter your email</div>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="🔒 Password" name="password">
            <div class="error-msg" id="passError">Password required</div>
        </div>

        <button class="login-btn" onclick="handleLogin()">LOGIN →</button>
    </div>

    <script src="login.js"></script>
</body>
</html>

<!doctype html>
<html>
  <head>
    <title>Smart Maintenance Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 100px;
        background-color: #f5f5f5;
      }

      input {
        padding: 10px;
        width: 220px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        padding: 10px 20px;
        background-color: #28a745;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
      }

      button:hover {
        background-color: #218838;
      }
    </style>
  </head>
  <body>
    <h1>Smart Maintenance System</h1>

    <form>
      <input type="email" placeholder="Email" />
      <br /><br />
      <input type="password" placeholder="Password" />
      <br /><br />
      <button>Login</button>
    </form>
  </body>
</html>
